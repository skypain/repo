<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, user-scalable=0">
        <title> </title>
        <link rel="stylesheet" type="text/css" href="../../Assets/Style/index.css">
        <script src="../../Assets/Js/index.js"></script>
        <script src="../../Assets/Frame/jquery/jquery-1.12.4.min.js"></script>
    </head>

<body>
    <div class="body">
        <div id="head" style="background-image: url(../../Assets/Image/Default_Head.jpg)" class="banner_underlay"></div>
        <div class="nav">
            <div id="describe" class="nav_btn active tweak_info_btn" onclick="swap('.changelog','.tweak_info');">插件信息</div>
            <div id="screenshot" class="nav_btn changelog_btn" onclick="swap('.tweak_info','.changelog');">截图预览</div>
        </div>
        <div class="tweak_info">
            <p class="compatibility"><b>系统兼容:</b> 该插件仅兼容 IOS 11 - 13 系统</p>
            <div class="md_view">
                <p>
                    <p>
                        <h4 id="info-h4">功能速描</h4>
                    </p>
                    <p id="info-p-describe">demo</p>
                </p>
            </div>
            <h3 id="info-h3">插件信息</h3>
            <div class="table">
                <div class="cell">
                    <div id="info-title-1" class="title">开发人员:</div>
                    <div id="info-text-1" class="text">Pain</div>
                    <br><br>
                </div>
                <div class="cell">
                    <div id="info-title-2" class="title">最新版本:</div>
                    <div id="info-text-2" class="text">1.0.0</div>
                    <br><br>
                </div>
                <div class="cell">
                    <div id="info-title-3" class="title">系统兼容:</div>
                    <div id="info-text-3" class="text">iOS 11 - 13</div>
                    <br><br>
                </div>
                <div class="cell">
                    <div id="info-title-4" class="title">插件大小:</div>
                    <div id="info-text-4" class="text">10000 Bytes</div>
                    <br><br>
                </div>
                <div class="cell">
                    <div id="info-title-5" class="title">最后更新:</div>
                    <div id="info-text-5" class="text">2020-02-02 00:00</div>
                    <br><br>
                </div>
                <div class="cell">
                    <div id="info-title-6" class="title">所属归类:</div>
                    <div id="info-text-6" class="text">Tweaks</div>
                    <br><br>
                </div>
            </div>
        </div>
        <div class="changelog layui-anim-up">
            <div class="scroll_view">
                <img id="Screenshot-1" class="img_card" src="">
                <img id="Screenshot-2" class="img_card" src="">
                <img id="Screenshot-3" class="img_card" src="">
            </div>
        </div>
    </div>
</body>
<script>
    compatible("11", "13.3", "iOS 11 to 13.3");
    externalize();
    var name = getQueryVariable("page");
    if (name == "false") {
        location.href = "../../404.html";
    }
    Loading("pain",name)
</script>
</html>
